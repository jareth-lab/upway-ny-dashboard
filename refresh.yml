name: Refresh NY Dashboard

on:
  # Every 30 min, Mon–Sat, 11am–11pm UTC (≈ 7am–7pm EDT)
  schedule:
    - cron: '0,30 11-23 * * 1-6'
  # Manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push data.json back to the repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run refresh script
        env:
          METABASE_USER: ${{ secrets.METABASE_USER }}
          METABASE_PASS: ${{ secrets.METABASE_PASS }}
        run: python refresh.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: refresh dashboard data [skip ci]"
          git push
